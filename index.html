<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-itunes-app" content="app-id=6787942907">
<title>Yoink: digital business cards</title>
<style>
  :root { color-scheme: light dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: #f2f2f7; color: #111;
    min-height: 100svh; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  main { max-width: 26rem; }
  .logo {
    width: 72px; height: 72px; border-radius: 18px; background: #111;
    color: #fff; font-size: 34px; font-weight: 800; line-height: 72px;
    margin: 0 auto 24px; letter-spacing: -1px;
  }
  h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
  p.lede { font-size: 1.02rem; line-height: 1.5; color: #555; margin-bottom: 28px; }
  a.cta {
    display: block; background: #111; color: #fff; text-decoration: none;
    font-size: 1.05rem; font-weight: 600; padding: 16px 24px; border-radius: 14px;
    margin-bottom: 20px;
  }
  a.minor { font-size: 0.9rem; color: #8a8a8e; }
  @media (prefers-color-scheme: dark) {
    body { background: #000; color: #f2f2f7; }
    .logo { background: #fff; color: #000; }
    p.lede { color: #b0b0b5; }
    a.cta { background: #fff; color: #000; }
    a.minor { color: #7c7c80; }
  }
</style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true">Y</div>
    <h1>Yoink</h1>
    <p class="lede">Digital business cards that swap hands in seconds. In person,
       phone to phone, with nothing stored on a server.</p>
    <a class="cta" href="https://apps.apple.com/app/id6787942907">Get Yoink on the App&nbsp;Store</a>
    <a class="minor" href="/Yoink-privacy-support/">Privacy &amp; support</a>
  </main>
</body>
</html>
